<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة QDU للاختبار التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f4f7fb;
            --bg-card: #ffffff;
            --primary: #0066cc;
            --primary-light: #e6f0fa;
            --secondary: #5c728a;
            --success: #28a745;
            --danger: #dc3545;
            --text-main: #2c3e50;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --img-bg: #f8fafc;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-lg: 16px;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #3b82f6;
            --primary-light: #1e3a8a;
            --secondary: #94a3b8;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --border: #334155;
            --img-bg: #0f172a;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2.5rem 1rem;
            text-align: center;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            position: relative;
        }

        .header-actions {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            margin-top: 1rem;
        }

        .subtitle {
            color: var(--secondary);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 600;
        }

        /* Home Screen Selection */
        .home-screen {
            width: 95%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .home-screen h2 {
            margin-bottom: 2rem;
            color: var(--text-main);
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .image-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .image-card i {
            font-size: 2.5rem;
            color: var(--primary);
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .image-card.all-images {
            background: linear-gradient(135deg, var(--primary), #00a8ff);
            color: white;
            border: none;
            grid-column: 1 / -1;
            padding: 1.5rem;
            flex-direction: row;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .image-card.all-images i, .image-card.all-images h3 {
            color: white;
        }

        .image-card.all-images:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 102, 204, 0.3);
        }

        .image-thumb {
            width: 100%;
            height: 140px;
            object-fit: contain;
            border-radius: 8px;
            background: var(--img-bg);
            border: 1px solid var(--border);
        }

        /* Quiz Container */
        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 95%;
            max-width: 1200px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
            display: none;
        }

        @media (min-width: 992px) {
            .quiz-container {
                flex-direction: row;
            }
        }

        .image-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 2px solid var(--border);
            background: var(--img-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        @media (min-width: 768px) {
            .image-wrapper {
                min-height: 350px;
            }
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 40vh;
            object-fit: contain;
        }
        
        @media (min-width: 992px) {
            .image-wrapper img {
                max-height: 60vh;
            }
        }
        
        .no-image-text {
            position: absolute;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        .back-btn {
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            margin-top: 10px;
        }

        .back-btn:hover {
            background: #d0e3f5;
        }

        .quiz-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .question-number {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .score-display {
            font-size: 1.2rem;
            font-weight: 600;
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }

        .question-text {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.4;
            color: var(--text-main);
        }

        .highlight-number {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            width: clamp(35px, 8vw, 45px);
            height: clamp(35px, 8vw, 45px);
            line-height: clamp(35px, 8vw, 45px);
            text-align: center;
            border-radius: 50%;
            font-family: 'Inter', sans-serif;
            font-size: clamp(1rem, 3vw, 1.4rem);
            margin: 0 0.5rem;
            box-shadow: 0 4px 10px rgba(0, 102, 204, 0.2);
            font-weight: 800;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .option-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: clamp(0.7rem, 2vw, 1rem);
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: #d4edda;
            border-color: var(--success);
            color: #155724;
        }

        .option-btn.wrong {
            background: #f8d7da;
            border-color: var(--danger);
            color: #721c24;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .icon-indicator {
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .option-btn.correct .icon-indicator,
        .option-btn.wrong .icon-indicator {
            opacity: 1;
        }

        .controls {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
            box-shadow: 0 4px 10px rgba(0, 102, 204, 0.3);
        }

        .next-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        /* Results Screen */
        .results-screen {
            display: none;
            text-align: center;
            padding: 3rem;
            animation: fadeIn 0.5s ease;
        }

        .trophy-icon {
            font-size: 5rem;
            color: #ffc107;
            margin-bottom: 1rem;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .restart-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 2rem;
        }

        .restart-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <header>
        <div class="header-actions">
            <button class="action-btn" id="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع الليلي"><i class="fa-solid fa-moon"></i></button>
            <button class="action-btn" id="fullscreen-toggle" onclick="toggleFullScreen()" title="وضع ملء الشاشة"><i class="fa-solid fa-expand"></i></button>
        </div>
        <h1>منصة QDU للاختبار التفاعلي</h1>
        <p class="subtitle">التشريح العملي | إعداد الطالب مقتدى الكناني</p>
    </header>

    <!-- Home Screen -->
    <div class="home-screen" id="home-screen">
        <h2>اختر الصورة للبدء في تشخيص المعالم</h2>
        <div class="image-grid" id="image-grid">
            <div class="image-card all-images" onclick="startQuiz('all')">
                <i class="fa-solid fa-layer-group"></i>
                <span>امتحان شامل بجميع الصور</span>
            </div>
            <!-- Dynamic cards will be injected here -->
        </div>
    </div>

    <!-- Quiz Container -->
    <div class="quiz-container" id="quiz-app">
        <!-- Image Section -->
        <div class="image-col">
            <div class="image-wrapper" id="img-container">
                <div class="no-image-text" id="no-image-msg">
                    <i class="fa-regular fa-image" style="font-size: 4rem; opacity: 0.5; margin-bottom: 1rem;"></i>
                    <p>معاينة الصورة ستظهر هنا</p>
                </div>
                <img id="anatomy-image" src="" alt="صورة تشريحية" style="display: none;" onerror="this.style.display='none'; document.getElementById('no-image-msg').style.display='block';">
            </div>
            <button class="back-btn" onclick="backToHome()"><i class="fa-solid fa-house"></i> العودة للرئيسية</button>
        </div>

        <!-- Quiz Section -->
        <div class="quiz-col" id="quiz-content">
            <div class="progress-header">
                <div class="question-number">السؤال <span id="current-q">1</span> من <span id="total-q">9</span></div>
                <div class="score-display"><i class="fa-solid fa-check" style="color: var(--success);"></i> صحيح: <span id="score">0</span></div>
            </div>

            <div class="question-text" id="question-text">
                ماذا يمثل التأشير رقم <span class="highlight-number" id="pointer-num">1</span> في الصورة؟
            </div>

            <div class="options-grid" id="options-grid">
                <!-- Options will be injected here -->
            </div>

            <div class="controls">
                <button class="next-btn" id="next-btn">السؤال التالي <i class="fa-solid fa-arrow-left"></i></button>
            </div>
        </div>

        <!-- Results Section -->
        <div class="quiz-col results-screen" id="results-screen">
            <i class="fa-solid fa-trophy trophy-icon"></i>
            <h2>اكتمل الاختبار!</h2>
            <p style="color: var(--text-muted); margin: 1rem 0;">أكملت اختبار تحديد المعالم التشريحية بنجاح</p>
            <div class="final-score"><span id="final-score-val">0</span> / <span id="total-score-val">9</span></div>
            <button class="restart-btn" id="restart-btn"><i class="fa-solid fa-rotate-right"></i> إعادة الاختبار لنفس المجموعة</button>
        </div>
    </div>

    <audio id="wrong-sound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>

        const shuffleArray = (array) => {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        };

        let currentQuizData = [];
        let currentImageFilter = 'all';
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        const homeScreen = document.getElementById('home-screen');
        const quizApp = document.getElementById('quiz-app');
        const imageElement = document.getElementById('anatomy-image');
        const noImageMsg = document.getElementById('no-image-msg');
        
        const pointerNumSpan = document.getElementById('pointer-num');
        const optionsGrid = document.getElementById('options-grid');
        const nextBtn = document.getElementById('next-btn');
        const currentQSpan = document.getElementById('current-q');
        const scoreSpan = document.getElementById('score');
        const totalQSpan = document.getElementById('total-q');
        
        const quizContent = document.getElementById('quiz-content');
        const resultsScreen = document.getElementById('results-screen');
        const restartBtn = document.getElementById('restart-btn');

        const correctSound = document.getElementById('correct-sound');
        const wrongSound = document.getElementById('wrong-sound');

        function startQuiz(imageFilter) {
            currentImageFilter = imageFilter;
            
            // Filter Data
            if (imageFilter === 'all') {
                currentQuizData = [...fullQuizData];
                // Shuffle questions if all are selected
                shuffleArray(currentQuizData);
            } else {
                currentQuizData = fullQuizData.filter(q => q.imageSrc === imageFilter);
            }
            
            if (currentQuizData.length === 0) {
                alert("لا توجد أسئلة متوفرة لهذه الصورة حالياً.");
                return;
            }

            // UI Transitions
            homeScreen.style.display = 'none';
            quizApp.style.display = 'flex';
            quizContent.style.display = 'flex';
            resultsScreen.style.display = 'none';
            
            // Re-init variables
            currentQuestionIndex = 0;
            score = 0;
            scoreSpan.innerText = score;
            totalQSpan.innerText = currentQuizData.length;
            
            loadQuestion();
        }

        function backToHome() {
            homeScreen.style.display = 'flex';
            quizApp.style.display = 'none';
        }

        imageElement.onload = function() {
            noImageMsg.style.display = 'none';
            imageElement.style.display = 'block';
        }

        function loadQuestion() {
            answered = false;
            nextBtn.style.display = 'none';
            
            const currentQ = currentQuizData[currentQuestionIndex];
            currentQSpan.innerText = currentQuestionIndex + 1;
            pointerNumSpan.innerText = currentQ.pointerNumber;

            // Manage Image src
            const filenameFromSrc = imageElement.src.substring(imageElement.src.lastIndexOf('/') + 1) || "";
            if (filenameFromSrc !== currentQ.imageSrc) {
                imageElement.src = currentQ.imageSrc;
                noImageMsg.style.display = 'block';
                imageElement.style.display = 'none'; // Temporarily hide until loaded
            }

            optionsGrid.innerHTML = '';
            
            let currentOptions = [...currentQ.options];
            shuffleArray(currentOptions);

            currentOptions.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.dir = 'ltr'; 
                
                btn.innerHTML = `
                    <span>${optionText}</span>
                    <i class="fa-solid fa-circle-check icon-indicator"></i>
                `;
                
                btn.onclick = () => checkAnswer(btn, optionText, currentQ.correctAnswer);
                optionsGrid.appendChild(btn);
            });
        }

        function playSound(type) {
            try {
                if (type === 'correct') {
                    correctSound.currentTime = 0;
                    correctSound.play().catch(e => console.log('Audio error:', e));
                } else {
                    wrongSound.currentTime = 0;
                    wrongSound.play().catch(e => console.log('Audio error:', e));
                }
            } catch(e) {}
        }

        function checkAnswer(selectedBtn, selectedText, correctText) {
            if(answered) return;
            answered = true;

            const allBtns = optionsGrid.querySelectorAll('.option-btn');
            
            if (selectedText === correctText) {
                selectedBtn.classList.add('correct');
                playSound('correct');
                score++;
                scoreSpan.innerText = score;
                allBtns.forEach(btn => btn.disabled = true);
                
                // Auto Advance on correct answer after 800ms
                setTimeout(() => {
                    advanceQuestion();
                }, 800);
            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.querySelector('.icon-indicator').className = 'fa-solid fa-circle-xmark icon-indicator';
                playSound('wrong');
                
                allBtns.forEach(btn => {
                    if (btn.querySelector('span').innerText === correctText) {
                        btn.classList.add('correct');
                    }
                });
                
                // Show next button only if answer is wrong
                allBtns.forEach(btn => btn.disabled = true);
                nextBtn.style.display = 'inline-block';
            }
        }

        function advanceQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        nextBtn.addEventListener('click', () => {
            advanceQuestion();
        });

        function showResults() {
            quizContent.style.display = 'none';
            resultsScreen.style.display = 'block';
            document.getElementById('final-score-val').innerText = score;
            document.getElementById('total-score-val').innerText = currentQuizData.length;
        }

        restartBtn.addEventListener('click', () => {
            startQuiz(currentImageFilter);
        });

        // Populate Image Grid dynamically
        const imageGrid = document.getElementById('image-grid');
        for (let i = 1; i <= 18; i++) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.onclick = () => startQuiz(`image${i}.jpg`);
            
            card.innerHTML = `
                <img src="image${i}.jpg" class="image-thumb" alt="الصورة ${i}" onerror="this.style.display='none'" />
                <span>الصورة ${i}</span>
            `;
            imageGrid.appendChild(card);
        }

        // Theme Toggle Logic
        const themeBtnIcon = document.querySelector('#theme-toggle i');
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtnIcon.className = 'fa-solid fa-moon';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtnIcon.className = 'fa-solid fa-sun';
            }
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtnIcon.className = 'fa-solid fa-sun';
        }

        // Fullscreen Logic
        const fsBtnIcon = document.querySelector('#fullscreen-toggle i');
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsBtnIcon.className = 'fa-solid fa-compress';
            } else {
                fsBtnIcon.className = 'fa-solid fa-expand';
            }
        });
